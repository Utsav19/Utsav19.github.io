<main style="max-width: 760px; margin: 40px auto; padding: 0 20px;">
	<p><a href="../index.html">Back to home</a></p>
	<h1>Open Positions</h1>

	<ul>
		{% for post in site.posts %}

			<a href="{{ post.url | relative_url }}">{{ post.title }}</a>
			- {{ post.date | date: "%Y-%m-%d" }}
		</li>
		{% endfor %}
	</ul>
</main>
